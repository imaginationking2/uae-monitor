name: UAE Market Daily Collector

on:
  schedule:
    - cron: '0 20 * * *'   # 12:00 AM UAE time (UTC+4)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — skip Gist push'
        required: false
        default: 'false'

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Run Apify collector actor
        id: apify_run
        run: |
          echo "Triggering Apify actor..."
          RUN_RESPONSE=$(curl -s -X POST \
            "https://api.apify.com/v2/acts/${{ secrets.APIFY_ACTOR_ID }}/runs" \
            -H "Authorization: Bearer ${{ secrets.APIFY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{}')

          echo "API response: $RUN_RESPONSE"
          RUN_ID=$(echo "$RUN_RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['id'])")
          echo "Run ID: $RUN_ID"
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT

          # Poll until finished (max 20 min = 120 * 10s)
          STATUS="RUNNING"
          for i in $(seq 1 120); do
            sleep 10
            STATUS=$(curl -s \
              "https://api.apify.com/v2/actor-runs/$RUN_ID" \
              -H "Authorization: Bearer ${{ secrets.APIFY_TOKEN }}" \
              | python3 -c "import sys,json; d=json.load(sys.stdin)['data']; print(d['status'])")
            echo "[$i/120] Status: $STATUS"
            if [[ "$STATUS" == "SUCCEEDED" ]]; then
              echo "Actor completed successfully."; break
            elif [[ "$STATUS" == "FAILED" || "$STATUS" == "ABORTED" || "$STATUS" == "TIMED-OUT" ]]; then
              echo "Actor run failed: $STATUS"; exit 1
            fi
          done

          if [[ "$STATUS" != "SUCCEEDED" ]]; then
            echo "Timed out waiting for actor."; exit 1
          fi

      - name: Fetch actor output
        id: fetch_output
        run: |
          RUN_ID="${{ steps.apify_run.outputs.run_id }}"
          OUTPUT=$(curl -s \
            "https://api.apify.com/v2/actor-runs/$RUN_ID/key-value-store/records/OUTPUT" \
            -H "Authorization: Bearer ${{ secrets.APIFY_TOKEN }}")

          echo "$OUTPUT" > /tmp/apify_output.json
          echo "Keys: $(echo "$OUTPUT" | python3 -c "import sys,json; print(list(json.load(sys.stdin).keys()))")"

          ERRORS=$(echo "$OUTPUT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(len(d.get('errors', [])))")
          echo "Scrape errors: $ERRORS"
          if [ "$ERRORS" -gt "3" ]; then
            echo "Too many errors ($ERRORS), aborting."; exit 1
          fi

      - name: Fetch current Gist history
        run: |
          curl -s \
            "https://gist.githubusercontent.com/imaginationking2/6864f9c206558d36b9777b00f3758087/raw/uae_history.json" \
            -o /tmp/uae_history.json
          echo "Gist fetched: $(wc -c < /tmp/uae_history.json) bytes"

      - name: Merge and build updated history JSON
        run: |
          python3 << 'PYEOF'
          import json
          from datetime import datetime

          with open('/tmp/apify_output.json') as f:
              new_data = json.load(f)

          with open('/tmp/uae_history.json') as f:
              history = json.load(f)

          today = new_data['date']
          print(f"Merging data for: {today}")

          def upsert(series, entry, key='date'):
              if entry is None:
                  return series
              series = [e for e in series if e.get(key) != entry.get(key)]
              series.append(entry)
              series.sort(key=lambda e: e.get(key, ''))
              return series

          if new_data.get('dubizzle_entry'):
              history['dubizzle_series'] = upsert(history.get('dubizzle_series', []), new_data['dubizzle_entry'])
              print(f"  dubizzle_series: {len(history['dubizzle_series'])} entries")

          if new_data.get('bayut_entry'):
              history['bayut_series'] = upsert(history.get('bayut_series', []), new_data['bayut_entry'])
              print(f"  bayut_series: {len(history['bayut_series'])} entries")

          if new_data.get('luxury_entry'):
              history['luxury_drops_series'] = upsert(history.get('luxury_drops_series', []), new_data['luxury_entry'])
              print(f"  luxury_drops_series: {len(history['luxury_drops_series'])} entries")

          if new_data.get('ajman_entry'):
              history['ajman_property_series'] = upsert(history.get('ajman_property_series', []), new_data['ajman_entry'])
              print(f"  ajman_property_series: {len(history['ajman_property_series'])} entries")

          if new_data.get('stress'):
              history['stress_series'] = upsert(history.get('stress_series', []), new_data['stress'])
              print(f"  stress_series: {len(history['stress_series'])} entries")

          history['last_updated'] = new_data['scraped_at']
          history['latest_stress'] = new_data.get('stress', {})
          history['collection_errors'] = new_data.get('errors', [])

          with open('/tmp/uae_history_updated.json', 'w') as f:
              json.dump(history, f, indent=2)

          stress = new_data.get('stress', {})
          print(f"\n=== STRESS: {stress.get('total')}/100 — {stress.get('band')} ===")
          print(f"Components: {stress.get('components')}")
          errors = new_data.get('errors', [])
          if errors:
              print(f"Errors ({len(errors)}): {[e['source'] for e in errors]}")
          PYEOF

      - name: Push updated history to Gist
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          CONTENT=$(python3 -c "
          import json
          with open('/tmp/uae_history_updated.json') as f:
              data = f.read()
          print(json.dumps(data))
          ")

          RESPONSE=$(curl -s -X PATCH \
            "https://api.github.com/gists/6864f9c206558d36b9777b00f3758087" \
            -H "Authorization: Bearer ${{ secrets.GIST_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"files\": {\"uae_history.json\": {\"content\": $CONTENT}}}")

          echo "$RESPONSE" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          print('Gist updated:', d.get('html_url','error'), '| Updated:', d.get('updated_at','?'))
          "

      - name: Summary
        if: always()
        run: |
          echo "=== UAE MARKET COLLECTOR SUMMARY ==="
          echo "Date: $(date -u '+%Y-%m-%d %H:%M UTC')"
          if [ -f /tmp/apify_output.json ]; then
            python3 << 'PYEOF'
          import json
          with open('/tmp/apify_output.json') as f:
              d = json.load(f)
          s = d.get('stress', {})
          print(f"Stress: {s.get('total')}/100 — {s.get('band')}")
          print(f"Components: {s.get('components')}")
          dub = d.get('dubizzle_entry') or {}
          print(f"Dubizzle Furniture/Home: {dub.get('furniture_home','N/A')}")
          lux = d.get('luxury_entry') or {}
          print(f"Luxury drops: {lux.get('drop_count','N/A')} | max: {lux.get('max_drop_pct','N/A')}%")
          ajm = d.get('ajman_entry') or {}
          print(f"Ajman ratio: {ajm.get('ratio','N/A')}")
          errs = d.get('errors', [])
          print(f"Errors: {[e['source'] for e in errs] if errs else 'none'}")
          PYEOF
          fi
